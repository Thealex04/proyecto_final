{% extends 'base.html' %}

{% block content %}

<div class="form-container">
    <h2> Iniciar sesión </h2>

    <form method="POST">
        <div class="form-group">
            <label for="email">Email:</label><br>
            <input type="email" name="email" id="email" required>
        </div>

        <div class="form-group">
            <label for="password">Contraseña:</label><br>
            <input type="password" name="password" id="password" required>
        </div>

        <div class="form-check">
            <input type="checkbox" id="mostrarContraseña">
            <label>Mostrar contraseña</label>
        </div>

        <button type="submit" class="btn-submit">Entrar</button>
    </form>

    <p class="form-link">
        ¿No tienes cuenta aún?
        <a href="{{ url_for('registro')}}">Regístrate aquí</a>
    </p>

</div>



<!-- Hacemos un script que permite tener visible la contraseña si lo deseamos -->
<script>
    const checkbox = document.getElementById("mostrarContraseña")
    const password = document.getElementById("password")

    checkbox.addEventListener("change", function() {
        if (this.checked) {
            password.type = "text";
        } else {
            password.type = "password";
        }
        });
</script>

{% endblock %}
